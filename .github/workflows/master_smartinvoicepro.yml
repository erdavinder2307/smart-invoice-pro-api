# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - smartinvoicepro

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create and start virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate
      
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      # Optional: Add step to run tests here (PyTest, Django test suites, etc.)

      - name: Zip artifact for deployment
        run: zip release.zip ./* -r

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            release.zip
            !venv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write #This is required for requesting the JWT

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: unzip release.zip


      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'smartinvoicepro'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: release.zip

      - name: Wait for app warm-up
        run: sleep 20

      - name: Post-deploy smoke test
        env:
          BASE_URL: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
        run: |
          set -euo pipefail

          if [ -z "${BASE_URL}" ]; then
            BASE_URL="https://smartinvoicepro-e8ekfnf4b4abfvhx.centralindia-01.azurewebsites.net"
          fi

          echo "Using base URL: ${BASE_URL}"

          probe_endpoint() {
            local endpoint="$1"
            local retries=10
            local delay=15
            local attempt=1

            while [ "$attempt" -le "$retries" ]; do
              status=$(curl -sS -o /tmp/smoke_response.txt -w "%{http_code}" "${BASE_URL}${endpoint}" || true)
              if [ "$status" = "200" ]; then
                echo "PASS ${endpoint} (HTTP ${status})"
                return 0
              fi

              echo "Attempt ${attempt}/${retries} failed for ${endpoint} (HTTP ${status}). Retrying in ${delay}s..."
              attempt=$((attempt + 1))
              sleep "$delay"
            done

            echo "FAIL ${endpoint}. Last response body:"
            cat /tmp/smoke_response.txt || true
            return 1
          }

          probe_endpoint "/"
          probe_endpoint "/api/quotes/next-number"

          