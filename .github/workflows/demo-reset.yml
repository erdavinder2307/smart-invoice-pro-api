name: Demo Tenant Nightly Reset

on:
    schedule:
    # Every 12 hours — restore Interactive Workspace baseline data
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  reset-demo-tenant:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt faker python-dotenv

      - name: Reset and reseed demo tenant
        env:
          DEMO_TENANT_ID: ${{ secrets.DEMO_TENANT_ID }}
          COSMOS_URI: ${{ secrets.COSMOS_URI }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
          COSMOS_DB_NAME: ${{ secrets.COSMOS_DB_NAME }}
        run: |
          set -euo pipefail
          if [ -z "${DEMO_TENANT_ID}" ] || [ -z "${COSMOS_URI}" ] || [ -z "${COSMOS_KEY}" ]; then
            echo "Missing required secrets: DEMO_TENANT_ID, COSMOS_URI, COSMOS_KEY"
            exit 1
          fi
          python scripts/provision_demo_environment.py --seed --reset --yes

      - name: Revoke demo refresh tokens
        env:
          DEMO_TENANT_ID: ${{ secrets.DEMO_TENANT_ID }}
          COSMOS_URI: ${{ secrets.COSMOS_URI }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
          COSMOS_DB_NAME: ${{ secrets.COSMOS_DB_NAME }}
        run: |
          python scripts/revoke_demo_sessions.py
